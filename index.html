<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topline generator</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --ok: #0f9d58;
      --error: #d93025;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input[type="file"],
    input[type="text"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .col-half {
      flex: 1 1 420px;
      min-width: 280px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: var(--accent-dark);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      white-space: pre-line;
      line-height: 1.45;
    }

    .status.ok {
      background: #ecfdf3;
      border-color: #b7ebc6;
      color: #166534;
    }

    .status.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .mapping-group {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      background: #fafafa;
    }

    .mapping-group-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .mapping-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mapping-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    .mapping-item input {
      margin-top: 2px;
    }

    .mapping-item label {
      margin: 0;
      font-weight: 400;
    }

    .pill-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill-checkboxes label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      font-weight: 400;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
    }

    small {
      color: var(--muted);
      line-height: 1.4;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 700px) {
      .container {
        padding: 16px;
      }

      h1 {
        font-size: 24px;
      }

      .card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Topline generator</h1>
    <p class="subtitle">
      Загрузите Excel-базу, проверьте найденные вопросы и сформируйте topline в Excel.
    </p>

    <div class="card">
      <h2>1. Загрузка базы</h2>

      <div class="field">
        <label for="baseFile">Файл базы (.xlsx)</label>
        <input type="file" id="baseFile" accept=".xlsx,.xls">
      </div>

      <div id="status" class="status">
        Загрузите файл базы, чтобы начать.
      </div>
    </div>

    <div class="card" id="mappingSection" style="display:none;">
      <h2>2. Найденные стандартные вопросы</h2>
      <div id="standardGroups" class="row"></div>
    </div>

    <div class="card" id="extraSection" style="display:none;">
      <h2>3. Дополнительные метрики</h2>
      <div id="extraQuestions"></div>
    </div>

    <div class="card" id="runSection" style="display:none;">
      <h2>4. Расчёт</h2>
      <button id="runBtn" class="btn">Посчитать топлайн</button>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script defer src="./app.js"></script>
</body>
</html>
