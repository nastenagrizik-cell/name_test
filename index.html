<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Topline Naming Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap">
  <style>
    :root {
      --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --color-bg: #f7f6f2;
      --color-surface: #fbfbf9;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-muted: #7a7974;
      --color-primary: #01696f;
      --radius-md: 0.5rem;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      font-family:"Satoshi",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      font-size:var(--text-base);
      color:var(--color-text);
      background:var(--color-bg);
      line-height:1.6;
    }
    .page {
      max-width:960px;
      margin:0 auto;
      padding:var(--space-8) var(--space-4);
    }
    header { margin-bottom:var(--space-6); }
    h1 { font-size:var(--text-xl); margin-bottom:var(--space-2); }
    p.lead { color:var(--color-muted); max-width:52ch; }
    .card {
      background:var(--color-surface);
      border:1px solid var(--color-border);
      border-radius:var(--radius-md);
      padding:var(--space-6) var(--space-4);
      box-shadow:var(--shadow-sm);
    }
    label { font-size:var(--text-sm); font-weight:500; display:block; margin-bottom:var(--space-2); }
    input[type="file"] {
      display:block;
      width:100%;
      padding:0.6rem 0.9rem;
      border-radius:var(--radius-md);
      border:1px solid var(--color-border);
      background:white;
      font-size:var(--text-sm);
    }
    button {
      margin-top:var(--space-4);
      padding:0.65rem 1.5rem;
      border-radius:9999px;
      border:none;
      background:var(--color-primary);
      color:white;
      font-size:var(--text-sm);
      font-weight:500;
      cursor:pointer;
    }
    button:disabled { opacity:0.55; cursor:default; }
    .status {
      margin-top:var(--space-4);
      font-size:var(--text-sm);
      color:var(--color-muted);
      white-space:pre-line;
    }
    .error { color:#a12c7b; }
    .ok { color:#437a22; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Topline Naming Tool</h1>
      <p class="lead">
        Загрузите Excel с базой исследования — на выходе получите топлайн по шаблону (САММАРИ, полные таблицы, значимости, аудитория).
      </p>
    </header>

    <main>
      <section class="card">
        <label for="baseFile">База исследования (Excel *.xlsx)</label>
        <input id="baseFile" type="file" accept=".xlsx,.xls" />

        <button id="runBtn" disabled>Посчитать топлайн</button>

        <div id="status" class="status">
          1) выберите файл базы<br>
          2) нажмите «Посчитать топлайн» и дождитесь готового Excel.
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
